name: Build WiFi addon

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        run: docker build -t flex-wifi-builder .

      - name: Extract ZIP
        run: |
          CID=$(docker create flex-wifi-builder)
          docker cp "$CID:/wifi_addon.zip" wifi_addon.zip
          docker rm "$CID"
          sha256sum wifi_addon.zip

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: wifi_addon.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wifi_addon_artifact
          path: wifi_addon.zip

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: wifi_addon.zip
